# Deriv App Builder static exports. Their builds use these exact base paths.
location ^~ /trade/digits/ {
    root /var/www/deriv/static-apps/current;
    try_files $uri $uri/ /trade/digits/index.html;
}

location ^~ /trade/rise-fall/ {
    root /var/www/deriv/static-apps/current;
    try_files $uri $uri/ /trade/rise-fall/index.html;
}

location ^~ /trade/accumulators/ {
    root /var/www/deriv/static-apps/current;
    try_files $uri $uri/ /trade/accumulators/index.html;
}
