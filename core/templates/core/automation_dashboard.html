<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Profitera AI Scanner</title>
<style>
:root{color-scheme:dark;--panel:#121b2a;--line:#263349;--muted:#91a0b8;--blue:#1769ff;--green:#12c868;--red:#ff3e52}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 0,#172c51,transparent 35%),#07101d;color:#f4f7ff;font:14px Inter,Arial,sans-serif}main{max-width:1220px;margin:auto;padding:28px 18px 60px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{font-size:24px;font-weight:800}.top p{color:var(--muted);margin:6px 0}.back{color:white;text-decoration:none;border:1px solid var(--line);padding:10px 14px;border-radius:10px}.layout{display:grid;grid-template-columns:minmax(280px,390px) 1fr;gap:18px;margin-top:20px}.card{background:linear-gradient(145deg,#142034,#0d1625);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 18px 45px #0004}.card h2,.card h3{margin:0 0 13px}.muted{color:var(--muted)}.form{display:grid;gap:12px}.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}.wide{grid-column:1/-1}label{display:grid;gap:6px;color:#bdc9dc;font-size:12px}input,select{width:100%;background:#0a1321;color:#fff;border:1px solid var(--line);border-radius:9px;padding:10px}button{border:0;border-radius:10px;padding:11px 14px;color:white;background:linear-gradient(135deg,#287cff,#1254df);font-weight:800;cursor:pointer}.stop{background:#26334a}.actions{display:flex;gap:9px}.hidden{display:none}.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.metric{padding:13px;border:1px solid var(--line);background:#0b1422;border-radius:11px}.metric b{display:block;font-size:16px;margin-top:5px}.market-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.market{border:1px solid var(--line);padding:13px;border-radius:12px;background:#0b1422}.market.selected{border-color:#2375ff;box-shadow:0 0 0 1px #2375ff55}.digits{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:9px}.digit{background:#152238;border-radius:7px;text-align:center;padding:6px 2px;font-size:11px}.trade-table{width:100%;border-collapse:collapse;font-size:12px}.trade-table th,.trade-table td{text-align:left;padding:9px 6px;border-bottom:1px solid #213047}.gain{color:var(--green)}.loss{color:var(--red)}#toast{position:fixed;z-index:50;right:22px;top:22px;width:min(390px,calc(100vw - 44px));padding:18px 18px 16px 84px;border-radius:14px;border:1px solid;box-shadow:0 20px 55px #0009;backdrop-filter:blur(14px);transform:translateY(-25px);opacity:0;pointer-events:none;transition:.28s ease}#toast.show{transform:none;opacity:1;pointer-events:auto}#toast.win{background:#063b28e8;border-color:#14cf71}#toast.lose{background:#421623ed;border-color:#ff4055}.icon{position:absolute;left:18px;top:18px;width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:#18c970;font-size:23px}.lose .icon{background:#ff3d4c}.close{position:absolute;right:11px;top:9px;background:transparent;padding:4px;font-size:20px}.toast-title{font-size:17px;font-weight:800}.toast-profit{font-weight:800;margin-top:5px}.toast-balance{margin-top:5px;color:#d9e5ef}@media(max-width:800px){.layout{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.top{align-items:flex-start}.fields{grid-template-columns:1fr}}
</style></head><body><main>
<div class="top"><div><div class="brand">AI Digit Scanner</div><p>Demo account only · scans every selected market and trades only the strongest qualifying signal.</p></div><a class="back" href="/dashboard/">← Dashboard</a></div>
<div id="app" class="layout"><section class="card">Loading administrator-enabled bots…</section></div>
</main><aside id="toast" role="status" aria-live="polite"><span class="icon"></span><button class="close" aria-label="Close notification">×</button><div class="toast-title"></div><div class="toast-profit"></div><div class="toast-balance"></div></aside>
<script>
const api='/api/trading/automation/';document.querySelector('.top p').textContent='Choose your linked Demo or Real account · scans every active Volatility market and trades only the strongest qualifying signal.';const automationAccounts=[{% for a in automation_accounts %}{id:'{{a.account_id|escapejs}}',type:'{{a.account_type|escapejs}}',balance:'{{a.balance}}',currency:'{{a.currency|escapejs}}'},{% endfor %}];let botId,timer,lastSettled=new Set(),toastTimer,historyHydrated=false;const app=document.querySelector('#app'),toast=document.querySelector('#toast');
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const csrf=()=>document.cookie.split('; ').find(item=>item.startsWith('csrftoken='))?.split('=')[1]||'';
async function json(url,opt={}){const headers={...(opt.headers||{})};if(opt.method&&opt.method!=='GET'){headers['X-CSRFToken']=csrf()}const r=await fetch(url,{credentials:'same-origin',...opt,headers});const d=await r.json();if(!r.ok)throw Error(d.error||'Request failed');return d}
async function refreshAutomationAccounts(){const picker=document.querySelector('#account');if(!picker)return false;try{const data=await json(api+'accounts/');if(!data.accounts.length){picker.innerHTML='<option value="">No authorised Deriv account found</option>';return true}picker.innerHTML=data.accounts.map(item=>`<option value="${esc(item.account_id)}" data-live="${item.account_type==='real'?'1':'0'}">${item.account_type==='demo'?'Demo':'Real'} account · ${esc(item.balance)} ${esc(item.currency)}</option>`).join('');picker.onchange?.();return true}catch(error){picker.innerHTML='<option value="">Unable to refresh Deriv accounts</option>';return true}}
const waitForAccountPicker=setInterval(async()=>{if(await refreshAutomationAccounts())clearInterval(waitForAccountPicker)},150);
function enrichAccounts(){const picker=document.querySelector('#account');if(!picker)return;for(const option of picker.options){const item=automationAccounts.find(account=>account.id===option.value);if(item)option.textContent=`${item.type==='demo'?'Demo':'Real'} account · ${item.balance} ${item.currency}`}}
function thresholds(){if(!strategy.querySelector('option[value="auto"]')){strategy.innerHTML='<option value="auto">Automatic — bot chooses Over 2 or Under 7</option>';strategy.disabled=true}const ds=strategy.value==='auto'?[0,1,2,7,8,9]:strategy.value==='under_7'?[7,8,9]:[0,1,2];document.querySelector('#thresholds').innerHTML=ds.map(d=>`<label>Digit ${d} maximum %<input id="d${d}" type="number" min="0.1" max="100" step="0.1" value="8"></label>`).join('');enrichAccounts()}
function notify(t,balance,currency){const win=Number(t.profit)>0;toast.className=(win?'win':'lose')+' show';toast.querySelector('.icon').textContent=win?'↗':'↘';toast.querySelector('.toast-title').textContent=win?'Trade Won! 🎉':'Trade Lost 😔';toast.querySelector('.toast-profit').textContent=(win?'You gained ':'You lost ')+Math.abs(Number(t.profit)).toFixed(2)+' '+currency;toast.querySelector('.toast-balance').textContent=balance?'New balance: '+balance+' '+currency:'';clearTimeout(toastTimer);toastTimer=setTimeout(hideToast,3500)}function hideToast(){toast.classList.remove('show')}toast.querySelector('.close').onclick=hideToast;addEventListener('keydown',e=>{if(e.key==='Escape')hideToast()});
async function load(){try{const d=await json(api+'bots/');if(!d.bots.length){app.innerHTML='<section class="card"><h2>No automation bot is enabled</h2><p class="muted">An administrator must publish a bot before it can be used.</p></section>';return}const b=d.bots[0];botId=b.id;app.innerHTML=`<section class="card"><h2>${esc(b.name)}</h2><p class="muted">${esc(b.description||'Rule-based Over/Under digit scanner')}</p><div class="form"><div class="fields"><label class="wide">Trading account<select id="account">{% for a in automation_accounts %}<option value="{{a.account_id}}" data-live="{% if a.account_type == 'real' %}1{% else %}0{% endif %}">{{a.account_id}} · {{a.account_type|title}} · {{a.currency}}</option>{% empty %}<option value="">Link an account in Dashboard first</option>{% endfor %}</select></label><label class="wide">Volatility indices <input id="symbols" value="1HZ10V,1HZ25V,1HZ50V" aria-label="Markets"></label><label>Strategy<select id="strategy"><option value="over_2">Over 2</option><option value="under_7">Under 7</option></select></label><label>Stake (min $0.35)<input id="stake" value="0.35" type="number" min="0.35" step="0.01"></label><label>Rolling ticks<input id="window" value="40" type="number" min="20" max="5000"></label><label>Daily loss cap (optional)<input id="daily" type="number" min="0.01" step="0.01" placeholder="No cap"></label><label class="wide">Daily trade cap (optional)<input id="tradecap" type="number" min="1" step="1" placeholder="No cap"></label><label class="wide hidden" id="liveconfirm"><input id="liveok" type="checkbox"> I understand this starts automated trades on my real account using my configured stake and limits.</label></div><div id="thresholds" class="fields"></div><div class="actions"><button id="start">Start scanner</button><button id="stop" class="stop">Stop safely</button></div></div></section><section class="card"><h2>Live scanner</h2><div id="live" class="muted">Preparing live metrics…</div></section>`;strategy.onchange=thresholds;account.onchange=()=>liveconfirm.classList.toggle('hidden',account.selectedOptions[0]?.dataset.live!=='1');account.onchange();thresholds();start.onclick=startRun;stop.onclick=stopRun;status()}catch(e){app.innerHTML='<section class="card">'+esc(e.message)+'</section>'}}
async function startRun(){try{let ds=strategy.value==='under_7'?[7,8,9]:[0,1,2],dt={};ds.forEach(d=>dt[d]=document.querySelector('#d'+d).value);await json(api+'bots/'+botId+'/run/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account_id:account.value,symbols:symbols.value.split(',').map(x=>x.trim()).filter(Boolean),scan_all_volatility:true,strategy:strategy.value,stake:stake.value,tick_window:window.value,digit_thresholds:dt,max_daily_loss:daily.value,max_trades_per_day:tradecap.value,confirm_live_trading:!!liveok?.checked})});status()}catch(e){alert(e.message)}}
async function stopRun(){try{await json(api+'bots/'+botId+'/run/',{method:'DELETE'});status()}catch(e){alert(e.message)}}
function markets(stats,selected){let values=stats?.markets||{};return Object.entries(values).map(([symbol,s])=>`<article class="market ${symbol===selected?'selected':''}"><b>${esc(symbol)}</b><div class="muted">Confidence: ${s.score??'—'} · Lower ${s.lower??'—'}% / Upper ${s.upper??'—'}%</div><div class="digits">${(s.digits||[]).map((v,i)=>`<div class="digit">${i}<br><b>${v}%</b></div>`).join('')}</div></article>`).join('')||'<p class="muted">Collecting the configured rolling tick history for each market…</p>'}
async function status(){if(!botId)return;try{const d=await json(api+'bots/'+botId+'/run/');const selected=d.selected_symbol||'Scanning all markets',s=d.stats?.markets?.[d.selected_symbol]||{};for(const t of d.trades||[]){if((t.status==='won'||t.status==='lost')&&!lastSettled.has(t.contract_id)){lastSettled.add(t.contract_id);if(historyHydrated&&t.settled_at)notify(t,d.balance,d.currency)}}historyHydrated=true;live.innerHTML=`<div class="metrics"><div class="metric"><span class="muted">Status</span><b>${esc(d.status)}</b></div><div class="metric"><span class="muted">Selected market</span><b>${esc(selected)}</b></div><div class="metric"><span class="muted">Waiting trigger</span><b>${esc(d.waiting_for||'—')}</b></div><div class="metric"><span class="muted">Active contract</span><b>${esc(d.active_contract_id||'—')}</b></div><div class="metric"><span class="muted">Running P/L</span><b class="${Number(d.profit_loss)>=0?'gain':'loss'}">${esc(d.profit_loss)} ${esc(d.currency||'')}</b></div><div class="metric"><span class="muted">Win rate</span><b>${d.win_rate}%</b></div></div>${d.error?'<p class="loss">'+esc(d.error)+'</p>':''}<h3 style="margin-top:20px">Market analysis</h3><div class="market-grid">${markets(d.stats,d.selected_symbol)}</div><h3 style="margin-top:20px">Recent trades</h3><table class="trade-table"><tr><th>Market</th><th>Strategy</th><th>Trigger</th><th>Stake</th><th>Result</th><th>P/L</th></tr>${(d.trades||[]).map(t=>`<tr><td>${esc(t.symbol)}</td><td>${esc(t.strategy)}</td><td>${t.trigger_digit}</td><td>${t.stake}</td><td>${esc(t.status)}</td><td class="${Number(t.profit)>0?'gain':Number(t.profit)<0?'loss':''}">${t.profit}</td></tr>`).join('')}</table>`}catch(e){live.innerHTML='<span class="loss">'+esc(e.message)+'</span>'}clearTimeout(timer);timer=setTimeout(status,500)}load();
</script></body></html>
