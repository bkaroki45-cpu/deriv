<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Profitera AI Scanner</title><style>body{margin:0;background:#f5f6fb;color:#20243b;font:14px Arial}main{max-width:1100px;margin:auto;padding:32px}h1{margin:0}.top{display:flex;justify-content:space-between;align-items:center}.card{background:#fff;border-radius:16px;padding:20px;margin-top:18px;box-shadow:0 8px 22px #17204612}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.stat{padding:12px;background:#f6f7fc;border-radius:10px}.digits{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}.digit{background:#f0f2fb;padding:8px;text-align:center;border-radius:8px}input,select,button{padding:10px;border-radius:8px;border:1px solid #d7daea}button{background:#f83261;color:#fff;border:0;font-weight:bold;cursor:pointer}button.stop{background:#343952}.muted{color:#697086}table{width:100%;border-collapse:collapse}td,th{padding:9px;border-bottom:1px solid #edf0f6;text-align:left}</style></head><body><main><div class="top"><div><h1>AI Digit Scanner</h1><p class="muted">Demo only · scans every selected market and executes only the strongest valid signal.</p></div><a href="/dashboard/">← Dashboard</a></div><div id="app" class="card">Loading administrator-enabled bots…</div></main><script>
const api='/api/trading/automation/';let botId, timer;const app=document.querySelector('#app');
async function json(url,opt){const r=await fetch(url,opt);const d=await r.json();if(!r.ok)throw Error(d.error||'Request failed');return d}
async function load(){const d=await json(api+'bots/');if(!d.bots.length){app.innerHTML='<h2>No automation bot is enabled</h2><p>Your administrator must enable one in Admin Panel before you can use it.</p>';return}const b=d.bots[0];botId=b.id;app.innerHTML=`<h2>${b.name}</h2><p>${b.description||'Over/Under digit scanner'}</p><div class="grid"><label>Demo account<select id="account">{% for a in demo_accounts %}<option value="{{a.account_id}}">{{a.account_id}} · {{a.currency}}</option>{% endfor %}</select></label><label>Markets (comma separated)<input id="symbols" value="1HZ10V,1HZ25V,1HZ50V"></label><label>Strategy<select id="strategy"><option value="over_2">Over 2</option><option value="under_7">Under 7</option></select></label><label>Stake (min 0.35)<input id="stake" value="0.35" type="number" min="0.35" step="0.01"></label><label>Tick history<input id="window" value="100" type="number" min="20"></label><label>Digit threshold %<input id="threshold" value="8" type="number" step="0.1"></label></div><p><button onclick="start()">Start demo scanner</button> <button class="stop" onclick="stop()">Stop safely</button></p><div id="live" class="muted">Stopped</div>`;status()}
async function start(){try{await json(api+'bots/'+botId+'/run/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account_id:account.value,symbols:symbols.value.split(',').map(x=>x.trim()),strategy:strategy.value,stake:stake.value,tick_window:document.querySelector('[id="window"]').value,digit_threshold:threshold.value})});status()}catch(e){alert(e.message)}}
async function stop(){await json(api+'bots/'+botId+'/run/',{method:'DELETE'});status()}
async function status(){if(!botId)return;try{const d=await json(api+'bots/'+botId+'/run/');const selected=d.selected_symbol||'Scanning all selected markets';const s=d.stats[selected]||{};live.innerHTML=`<div class="grid"><div class="stat"><b>Status</b><br>${d.status}</div><div class="stat"><b>Selected market</b><br>${selected}</div><div class="stat"><b>Waiting for</b><br>${d.waiting_for||'—'}</div><div class="stat"><b>Active trade</b><br>${d.active_contract_id||'—'}</div><div class="stat"><b>P/L</b><br>${d.profit_loss}</div><div class="stat"><b>Win rate</b><br>${d.win_rate}%</div><div class="stat"><b>Lower / Upper</b><br>${s.lower??'—'}% / ${s.upper??'—'}%</div></div>${s.digits?'<h3>Live digit distribution</h3><div class="digits">'+s.digits.map((v,i)=>'<div class="digit">'+i+'<br><b>'+v+'%</b></div>').join('')+'</div>':''}<h3>Trade history</h3><table><tr><th>Market</th><th>Strategy</th><th>Trigger</th><th>Stake</th><th>Result</th><th>P/L</th></tr>${d.trades.map(t=>'<tr><td>'+t.symbol+'</td><td>'+t.strategy+'</td><td>'+t.trigger_digit+'</td><td>'+t.stake+'</td><td>'+t.status+'</td><td>'+t.profit+'</td></tr>').join('')}</table>`}catch(e){live.innerHTML=e.message}clearTimeout(timer);timer=setTimeout(status,1000)}load();
</script></body></html>
