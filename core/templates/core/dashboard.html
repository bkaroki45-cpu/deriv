{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profitera Terminal</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}?v=account-sync-light-20260713-1">
</head>
<body>
    <script>
        window.PROFITERA_DERIV_APP_ID = "{{ deriv_ws_app_id|default:'1089'|escapejs }}";
        window.PROFITERA_DERIV_SESSION = {
            token: "{{ deriv_session.token|default:''|escapejs }}",
            accountId: "{{ deriv_session.account_id|default:''|escapejs }}",
            currency: "{{ deriv_session.currency|default:'USD'|escapejs }}",
            accountType: "{{ deriv_session.account_type|default:'real'|escapejs }}",
            connected: {% if deriv_session.is_connected %}true{% else %}false{% endif %}
        };
    </script>
    {% include "core/terminal.html" %}
    <script src="{% static 'js/chart_engine.js' %}?v=deriv-sync-20260707-1"></script>
    <script src="{% static 'js/digits_widget.js' %}?v=deriv-sync-20260707-1"></script>
    <script src="{% static 'js/market_stream.js' %}?v=deriv-sync-20260720-2"></script>
    <script src="{% static 'js/portfolio_stream.js' %}"></script>
    <script src="{% static 'js/deriv_ws_manager.js' %}?v=account-sync-20260713-1"></script>
    <script src="{% static 'js/bot_engine.js' %}"></script>
    <script src="{% static 'js/ui_controller.js' %}?v=deriv-execution-20260720-2"></script>
</body>
</html>
