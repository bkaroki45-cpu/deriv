<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>Video frame check</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
}
video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}
</style>
<video id="video" muted playsinline preload="auto"></video>
<script>
const src = "file:///C:/Users/Student/Downloads/videeee/Trade%20_%20Deriv%20-%20Google%20Chrome%202026-06-18%2004-00-50.mp4";
const params = new URLSearchParams(location.search);
const at = Number(params.get("t") || 0);
const video = document.getElementById("video");
video.src = src;
video.addEventListener("loadedmetadata", () => {
  video.currentTime = Math.min(Math.max(at, 0), Math.max(video.duration - 0.5, 0));
});
video.addEventListener("seeked", () => {
  video.pause();
  document.documentElement.dataset.ready = "1";
});
</script>
</html>
