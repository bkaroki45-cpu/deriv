<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>Accumulator chart render check</title>
<style>
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #15191a;
}
.deriv-terminal {
  --dt-chart: #171c24;
  --dt-chart-line: #e7edf3;
  width: 1280px;
  height: 720px;
}
.chart-stage {
  width: 100%;
  height: 100%;
}
#price-chart {
  display: block;
  width: 100%;
  height: 100%;
}
</style>
<main class="deriv-terminal">
  <section class="chart-stage">
    <canvas id="price-chart"></canvas>
  </section>
</main>
<script src="../core/static/js/chart_engine.js"></script>
<script>
const start = 1718697600;
let price = 818.7;
const path = [0.24, -0.11, -0.06, 0.15, 0.09, -0.04, 0.13, -0.22, 0.05, -0.12, 0.18, -0.08, 0.07, -0.04, 0.09, -0.14, -0.18, 0.12, 0.04, -0.06, 0.05, -0.03, -0.04, -0.07, -0.1, -0.05];
path.forEach((move, index) => {
  price += move;
  window.profiteraChart.upsertCandle({
    open: price - move,
    high: Math.max(price, price - move) + 0.03,
    low: Math.min(price, price - move) - 0.03,
    close: price,
    time: start + index,
  });
});
window.profiteraChart.setContractOverlay({ type: "accumulator", growthRate: "0.03" });
document.documentElement.dataset.ready = "1";
</script>
</html>
